services:
  app:
    build: ..
    container_name: byme_fixit_app
    ports:
      - "8000:80"
    volumes:
      - ..:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: byme_fixit_db
    restart: always
    environment:
      MYSQL_DATABASE: byme
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"